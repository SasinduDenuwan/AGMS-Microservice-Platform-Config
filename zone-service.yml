# ===============================
# Application Server
# ===============================
server:
  port: 8081

# ===============================
# Eureka Client
# ===============================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
  # ===============================
  # PostgreSQL Database Configuration
  # ===============================
  datasource:
    url: jdbc:postgresql://localhost:5432/agms_zone_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  # ===============================
  # JPA / Hibernate
  # ===============================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
