# ===============================
# Application Server
# ===============================
server:
  port: 8081

# ===============================
# Spring Configuration
# ===============================
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agms_zone_db
    username: postgres
    password: Sasindu@123
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# ===============================
# Eureka Client
# ===============================
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
